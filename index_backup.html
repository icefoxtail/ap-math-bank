<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP MATH | 프리미엄 아카이브 v11.2</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary: #2563eb;
            --navbar-bg: #0f172a;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --card-item-bg: #f8fafc;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --card-border: #e2e8f0;
        }

        [data-theme='dark'] {
            --bg: #020617;
            --card-bg: #1e293b;
            --card-item-bg: #0f172a;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --card-border: #334155;
            --navbar-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.5; 
            padding-bottom: 50px; 
            transition: background-color 0.3s, color 0.3s; 
        }

        .navbar { 
            background: var(--navbar-bg); 
            color: white; padding: 1.2rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .navbar h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; }
        .navbar h1 span { color: var(--primary); }

        .theme-toggle { 
            cursor: pointer; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 8px 12px; border-radius: 10px; 
            font-size: 0.85rem; font-weight: 600; 
            display: flex; align-items: center; gap: 8px; 
        }

        .search-area { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; display: flex; align-items: center; gap: 15px; position: relative; }
        .search-wrapper { flex-grow: 1; position: relative; display: flex; align-items: center; }
        
        .search-input { 
            width: 100%; padding: 0.8rem 2.5rem 0.8rem 1.2rem; 
            border: 1px solid var(--card-border); border-radius: 12px; 
            font-size: 1rem; background: var(--card-bg); color: var(--text-main); 
            transition: all 0.2s; 
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .search-input:disabled { opacity: 0.5; cursor: not-allowed; }

        .search-clear { 
            position: absolute; right: 10px; cursor: pointer; 
            background: var(--text-sub); color: #fff; 
            width: 18px; height: 18px; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; opacity: 0.5; transition: opacity 0.2s; 
        }
        .search-clear:hover { opacity: 1; }

        .stats { font-size: 0.9rem; color: var(--text-sub); font-weight: 600; white-space: nowrap; min-width: 60px; }

        .main-container { 
            max-width: 1200px; margin: 0 auto; padding: 0 1rem; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 1.5rem; 
        }
        
        .grade-section { 
            background: var(--card-bg); border-radius: 16px; padding: 1.5rem; 
            border: 1px solid var(--card-border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); 
            height: fit-content; transition: background-color 0.3s, border-color 0.3s; 
        }

        .grade-title { 
            font-size: 1.3rem; font-weight: 900; color: var(--text-main); 
            margin-bottom: 1.2rem; display: flex; align-items: center; gap: 10px; 
            border-bottom: 3px solid var(--primary); padding-bottom: 8px; 
        }
        
        .semester-sub-title { font-size: 0.95rem; font-weight: 800; color: var(--text-sub); margin: 1.2rem 0 0.6rem; display: flex; align-items: center; gap: 6px; }
        .semester-sub-title::before { content: '•'; color: var(--primary); }

        .grid { display: flex; flex-direction: column; gap: 0.7rem; }

        .exam-card { 
            background: var(--card-item-bg); padding: 1rem 1.2rem; border-radius: 12px; 
            border: 1px solid var(--card-border); text-decoration: none; color: inherit; 
            display: flex; justify-content: space-between; align-items: center; 
            transition: transform 0.2s ease-out, background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .exam-card:hover { background: var(--card-bg); border-color: var(--primary); transform: translateX(8px); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15); }
        
        .exam-name { font-weight: 800; font-size: 1.05rem; color: var(--text-main); }
        .badge-mid { color: var(--primary); font-weight: 800; font-size: 0.8rem; margin-left: 8px; }
        .badge-final { color: #e67e22; font-weight: 800; font-size: 0.8rem; margin-left: 8px; }
        .exam-tag { font-size: 0.75rem; background: var(--card-border); color: var(--text-sub); padding: 3px 10px; border-radius: 6px; font-weight: 600; }

        /* 🟢 [패치] 실패 시 새로고침 버튼 스타일 */
        .btn-reload {
            margin-top: 1.5rem; padding: 10px 24px; 
            background: var(--primary); color: white; border: none; 
            border-radius: 10px; font-weight: 800; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-reload:hover { transform: scale(1.05); }

        footer { text-align: center; padding: 5rem 0; font-size: 0.85rem; color: var(--text-sub); }

        @media (max-width: 480px) {
            .navbar { padding: 1rem; }
            .grade-section { padding: 1.2rem; }
            .exam-name { font-size: 1rem; }
        }
    </style>
</head>
<body data-theme="light">
    <nav class="navbar">
        <h1>AP MATH <span>PREMIUM</span></h1>
        <div class="theme-toggle" id="themeToggle"><span id="themeIcon">🌙</span> <span id="themeText">다크모드</span></div>
    </nav>
    <div class="search-area">
        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="시스템 로딩 중..." disabled>
            <div class="search-clear" id="searchClear">×</div>
        </div>
        <div class="stats" id="statsCount">DB 로드 중...</div>
    </div>
    <div class="main-container" id="mainContent"></div>
    <footer>&copy; 2026 AP MATH ACADEMY. ALL RIGHTS RESERVED.</footer>

    <script>
        // 🔵 [패치] 버전 관리 상수화 (나중에 자료 업데이트 시 여기만 바꾸면 끝!)
        const DB_VERSION = "11.2";
        
        let parsedList = [];
        const mainContent = document.getElementById('mainContent');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const statsCount = document.getElementById('statsCount');
        const body = document.body;

        async function loadDatabase() {
            try {
                // 🔵 [패치] 상수를 활용한 정교한 캐시 제어
                const response = await fetch(`db.json?v=${DB_VERSION}`);
                if (!response.ok) throw new Error('DB 로드 실패');
                const examFiles = await response.json();
                
                parsedList = examFiles.map(f => parseExam(f));
                
                searchInput.disabled = false;
                searchInput.placeholder = "학교명, 과목, 학년 검색...";
                render(); 
            } catch (err) {
                console.error(err);
                // 🟢 [패치] 장애 복구 버튼이 포함된 에러 메시지
                mainContent.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding:5rem; color:var(--text-sub);">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🛜</div>
                        데이터를 불러오는 데 실패했습니다.<br>네트워크 연결을 확인한 후 아래 버튼을 눌러주세요.
                        <br>
                        <button class="btn-reload" onclick="location.reload()">새로고침 시도</button>
                    </div>`;
                statsCount.textContent = "로드 실패";
            }
        }

        function parseExam(file) {
            const parts = file.replace(".js", "").split("_");
            const semester = parts[2] || "1학기";
            let subject = parts[4] || "기타";
            if (subject === "고1") subject = (semester === "1학기") ? "공통수학1" : "공통수학2";
            const schoolName = parts[1].replace(/\d+$/, ""); 
            const num = parts[1].match(/\d+$/) ? parts[1].match(/\d+$/)[0] : "";
            const isHigh = parts[1].includes("고");
            let gradeGroup = isHigh ? `고등학교 ${num}학년` : `중학교 ${num}학년`;
            let sortKey = isHigh ? (100 + parseInt(num)) : parseInt(num);
            if (["미적분", "대수", "확통", "기하"].includes(subject)) { gradeGroup = "고등 선택/심화"; sortKey = 200; }
            return { file: file, year: `20${parts[0]}`, school: schoolName, semester: semester, type: parts[3] === "기말" ? "기말" : "중간", subject: subject, gradeGroup: gradeGroup, sortKey: sortKey };
        }

        function render(term = "") {
            mainContent.innerHTML = "";
            const filtered = parsedList.filter(item => {
                const searchStr = `${item.file} ${item.school} ${item.subject} ${item.year} ${item.type} ${item.gradeGroup}`.toLowerCase();
                return searchStr.includes(term.toLowerCase());
            });
            
            searchClear.style.display = term ? "flex" : "none";

            if (filtered.length === 0) {
                mainContent.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:5rem; color:var(--text-sub);">일치하는 데이터가 없습니다.</div>`;
                statsCount.textContent = "0개 발견";
                return;
            }

            const gradeGroups = {};
            filtered.forEach(item => {
                if (!gradeGroups[item.gradeGroup]) gradeGroups[item.gradeGroup] = { sortKey: item.sortKey, data: { "1학기": [], "2학기": [] } };
                gradeGroups[item.gradeGroup].data[item.semester].push(item);
            });

            Object.keys(gradeGroups).sort((a, b) => gradeGroups[a].sortKey - gradeGroups[b].sortKey).forEach(grade => {
                const gradeDiv = document.createElement('div');
                gradeDiv.className = 'grade-section';
                gradeDiv.innerHTML = `<div class="grade-title">${grade}</div>`;
                ["1학기", "2학기"].forEach(sem => {
                    const list = gradeGroups[grade].data[sem];
                    if (list.length === 0) return;
                    const semTitle = document.createElement('div');
                    semTitle.className = 'semester-sub-title';
                    semTitle.textContent = sem;
                    gradeDiv.appendChild(semTitle);
                    const grid = document.createElement('div');
                    grid.className = 'grid';
                    list.forEach(info => {
                        const card = document.createElement('a');
                        card.className = 'exam-card';
                        card.href = `master_exam.html?data=${encodeURIComponent(info.file)}`;
                        card.target = "_blank"; card.rel = "noopener noreferrer"; 
                        const badgeClass = info.type === "기말" ? "badge-final" : "badge-mid";
                        card.innerHTML = `<div><span class="exam-name">${info.school}</span><span class="${badgeClass}">${info.type}</span></div><span class="exam-tag">${info.year} · ${info.subject}</span>`;
                        grid.appendChild(card);
                    });
                    gradeDiv.appendChild(grid);
                });
                mainContent.appendChild(gradeDiv);
            });
            statsCount.textContent = `총 ${filtered.length}개`;
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('ap-math-archive-theme') || 'light';
            body.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
        }
        
        function updateThemeUI(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            icon.textContent = theme === 'dark' ? '☀️' : '🌙';
            text.textContent = theme === 'dark' ? '라이트모드' : '다크모드';
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('ap-math-archive-theme', newTheme);
            updateThemeUI(newTheme);
        });

        searchInput.addEventListener('input', (e) => {
            if (parsedList.length === 0) return;
            render(e.target.value);
        });

        searchClear.addEventListener('click', () => { 
            searchInput.value = ""; 
            render(""); 
            searchInput.focus(); 
        });
        
        document.addEventListener('DOMContentLoaded', () => { 
            initTheme(); 
            loadDatabase();
        });
    </script>
</body>
</html>
