<style>
    /* 공통 페이지 설정 유지 */
    .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto; background: #fff; position: relative; overflow: hidden; page-break-after: always; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

    /* [시험지 모드] 4분할 격자 강제 */
    body.test-mode .content-container { 
        display: grid !important; 
        grid-template-columns: 1fr 1fr; 
        grid-template-rows: 1fr 1fr; 
        gap: 15mm; /* 문항 간 간격 */
        flex: 1;
    }
    body.test-mode .col-left, body.test-mode .col-right { 
        width: 100% !important; height: 100% !important; 
        padding: 0 !important; border: none !important; 
    }
    body.test-mode .item { 
        height: 100% !important; 
        border-bottom: none !important; 
        padding: 5mm;
        border: 1px solid #f1f5f9; /* 격자 가이드선 */
    }

    /* [해설지 모드] 지문 제거 및 유동형 2단 조판 */
    body.sol-mode .content-container { display: flex; justify-content: space-between; flex: 1; }
    body.sol-mode .col-left, body.sol-mode .col-right { width: 49.5%; height: auto; }
    body.sol-mode .q-box .content { display: none !important; } /* 지문 과감히 제거 */
    body.sol-mode .item { 
        height: auto !important; 
        padding-bottom: 8mm; 
        border-bottom: 1px dashed #cbd5e1; 
    }
    
    /* 해설지 전용 번호 박스 스타일 */
    body.sol-mode .num { 
        display: inline-block;
        border: 1.5px solid #1e293b;
        padding: 2px 8px;
        margin-bottom: 10px;
        color: #1e293b;
    }
</style>

<script>
/* [수정 2] MathJax TypeError 방지 로직 보강 */
async function initRender() {
    showStatus("데이터 분석 및 조판 중...", false);
    renderItems();
    
    if (window.MathJax) {
        // MathJax가 로드될 때까지 명확히 대기 (보내주신 TypeError 해결 핵심)
        try {
            await MathJax.startup.promise;
            await MathJax.typesetPromise([document.getElementById('item-pool')]);
        } catch (e) {
            console.error("MathJax 로딩 중 오류 발생:", e);
        }
    }
    await paginate();
}

/* [수정 3] 조판 엔진(paginate) - 4분할 격자 대응 */
async function paginate() {
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const isTestMode = document.body.classList.contains('test-mode');
    
    let page, col, used = 0, colIdx = 0, COL_LIMIT = 0;
    let itemCount = 0; // 시험지 모드용 카운터

    const addPage = () => {
        page = document.createElement('div'); 
        page.className = 'page';
        page.innerHTML = `
            <div class="header">
                <span>${escapeHtml(AppState.title)}</span>
                <span>- ${printArea.children.length + 1} -</span>
            </div>
            <div class="content-container">
                <div class="col-left"></div>
                <div class="col-right"></div>
            </div>`;
        printArea.appendChild(page);
        col = page.querySelector('.col-left'); 
        used = 0; colIdx = 0; itemCount = 0;
        COL_LIMIT = col.getBoundingClientRect().height;
    };

    addPage();
    items.forEach(item => {
        if (item.classList.contains('answer-sheet') && isTestMode) return;
        
        // [시험지 모드] 4개 단위로 페이지 강제 전환
        if (isTestMode) {
            if (itemCount > 0 && itemCount % 4 === 0) {
                addPage();
            }
            // 격자 순서에 따라 col 선택 (0,1번 좌 / 2,3번 우)
            const targetCol = (itemCount % 4 < 2) ? page.querySelector('.col-left') : page.querySelector('.col-right');
            targetCol.appendChild(item.cloneNode(true));
            itemCount++;
        } 
        // [해설지 모드] 기존 유동 조판 로직 유지
        else {
            col.appendChild(item);
            const itemH = Math.ceil(item.getBoundingClientRect().height);
            if (used + itemH > COL_LIMIT) {
                col.removeChild(item);
                if (colIdx === 0) { 
                    col = page.querySelector('.col-right'); colIdx = 1; used = 0; 
                } else { 
                    addPage(); 
                }
                col.appendChild(item);
                used = Math.ceil(item.getBoundingClientRect().height);
            } else { used += itemH; }
        }
    });
    showStatus("", false); 
}

/* [수정 4] 인덱스 대시보드 - 고등부 탭 및 아이콘 추가 */
function renderRecentExams() {
    const recent = JSON.parse(localStorage.getItem('ap_recent_exams') || '[]');
    let html = `
    <div id="category-nav" style="margin-bottom:20px;">
        <button onclick="filterRecent('all')">전체</button>
        <button onclick="filterRecent('중')">중등부</button>
        <button onclick="filterRecent('고')">고등부 🎓</button>
    </div>
    <div id="recent-container">`;
    
    if (recent.length === 0) return html + `<p>기록이 없습니다.</p></div>`;
    
    recent.forEach(ex => {
        const icon = ex.title.includes('고') ? '📕' : '📘';
        html += `<div class="recent-item" data-title="${ex.title}" onclick="location.href='?data=${encodeURIComponent(ex.data)}&title=${encodeURIComponent(ex.title)}'">
            <span style="margin-right:5px;">${icon}</span>${escapeHtml(ex.title)}
        </div>`;
    });
    return html + '</div>';
}
</script>
