        #mode-ctrl { position: fixed; top: 10px; right: 10px; z-index: 999; display: flex; gap: 8px; }

        .btn-sol  { background: #10b981; color: white; }

        /* [Dashboard] 최근 열람 퀵메뉴 스타일 */
        #recent-container { max-width: 600px; margin: 60px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .recent-item { display: inline-block; padding: 8px 16px; margin: 6px; background: #f8fafc; border-radius: 20px; cursor: pointer; font-size: 9.5pt; color: #475569; transition: 0.2s; border: 1px solid #e2e8f0; font-weight: 700; }
        .recent-item:hover { background: #eff6ff; color: #3b82f6; border-color: #3b82f6; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* [Print] 인쇄 시 불필요 UI 숨김 */
        @media print { 
            #mode-ctrl, .fav-btn, #recent-container { display: none !important; } 
            body { background: none; } 
            .page { margin: 0; box-shadow: none; border: none; }

<body class="test-mode">
    <div id="mode-ctrl">
        <button class="btn-test" onclick="setMode('test-mode')">시험지 모드</button>
        <button class="btn-sol" onclick="setMode('sol-mode')">해설 모드</button>
        <button onclick="handlePrint()" style="background:#1e293b; color:white;">PDF 출력</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>
    <div id="status-display"></div>

<script>
/* [Core] 앱 상태 관리 */
const AppState = { 
    title: "AP 수학학원 기출", 
    fileKey: "", 
    favorites: JSON.parse(localStorage.getItem('ap_favs') || '{}') 
};
let isPrintWarned = false;

/* [Security] XSS 방어를 위한 HTML Escape */
function escapeHtml(str) {
    if (!str) return "";
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

/* [Dashboard] 최근 열람 기록 관리 */
function updateRecentExams(title, dataFile) {
    let recent = JSON.parse(localStorage.getItem('ap_recent_exams') || '[]');
    recent = recent.filter(ex => ex.data !== dataFile);
    recent.unshift({ title, data: dataFile });
    localStorage.setItem('ap_recent_exams', JSON.stringify(recent.slice(0, 5)));
}

function renderRecentExams() {
    const recent = JSON.parse(localStorage.getItem('ap_recent_exams') || '[]');
    if (recent.length === 0) return `<div id="recent-container"><p style="color:#64748b;">열람한 시험지 기록이 없습니다.</p></div>`;
    let html = `<div id="recent-container"><p style="font-weight:800; font-size:11pt; margin-bottom:20px; color:#1e293b;">🕒 최근 열람한 시험지</p>`;
    recent.forEach(ex => { 
        // ex.data와 ex.title 모두 encodeURIComponent를 사용하여 URL 무결성 보장
        const safeData = encodeURIComponent(ex.data);
        const safeTitle = encodeURIComponent(ex.title);
        html += `<div class="recent-item" onclick="location.href='?data=${safeData}&title=${safeTitle}'">${escapeHtml(ex.title)}</div>`; 
    });
    return html + '</div>';
}

/* [UI] 모드 전환 및 즐겨찾기 */
async function setMode(mode) { 
    if (document.body.className === mode) return;
    document.body.className = mode; 
    showStatus("레이아웃 재구성 중...", false);
    await paginate(); 
}

function toggleFav(id, btn) { 
    AppState.favorites[id] = !AppState.favorites[id]; 
    btn.classList.toggle('active', AppState.favorites[id]); 
    localStorage.setItem('ap_favs', JSON.stringify(AppState.favorites)); 
}

function handlePrint() {
    if (!isPrintWarned) { 
        alert("인쇄 설정에서 [여백: 없음] 및 [배율: 100%]로 설정되어 있는지 확인하세요."); 
        isPrintWarned = true; 
    }
    window.print();
}

/* [Format] 텍스트 보안 및 수식 보호 출력 */
function secureFormat(text) {
    if (text === null || text === undefined) return "";
    text = String(text);
    const mathChunks = [];
    const placeholder = '\x00MATH\x00';
    const protected_ = text.replace(/\$[\s\S]*?\$/g, m => { mathChunks.push(m); return placeholder; });
    const escaped = protected_.split(placeholder).map(part => {
        const div = document.createElement('div');
        div.textContent = part;
        return div.innerHTML.replace(/&lt;br\s*\/?&gt;/gi, '<br>').replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gi, '<b>$1</b>')
            .replace(/&lt;(span|div)\s+style="([^"]*)"&gt;/gi, (_, t, s) => `<${t} style="${s.replace(/url\s*\(|expression|javascript:/gi, '')}">`)
            .replace(/&lt;\/(span|div)&gt;/gi, '</$1>');
    });
    let res = ""; escaped.forEach((p, i) => { res += p + (mathChunks[i] || ""); });
    return res;
}

/* [Render] 문항 풀 생성 */
function renderItems() {
    const pool = document.getElementById('item-pool');
    pool.innerHTML = '';
    const data = window.questionBank || [];
    data.forEach((q, i) => {
        const qId = `${AppState.fileKey}_${i}`;
        const isFav = AppState.favorites[qId] ? 'active' : '';
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `
            <div class="q-box">
                <span class="fav-btn ${isFav}" onclick="toggleFav('${qId}', this)">★</span>
                <span class="num">${i + 1}</span>
                <span class="content">${secureFormat(q.content)}</span>
            </div>
            <div class="sol-box">
                <div style="font-weight:bold; color:#3b82f6; margin-bottom:4px; font-size:8.5pt;">SOLUTION</div>
                <div style="font-size:9pt; color:#475569;">${secureFormat(q.solution)}</div>
                <div style="color:#ef4444; font-weight:800; margin-top:8px; border-top:1px dashed #cbd5e1; padding-top:8px;">정답: ${secureFormat(q.answer)}</div>
            </div>`;
        pool.appendChild(item);
    });
    
    // 정답표 생성
    const ansSheet = document.createElement('div');
    ansSheet.className = 'item answer-sheet';
    let ansHtml = `<div style="font-weight:900; color:#3b82f6; font-size:11pt; border-bottom:2px solid #3b82f6; padding-bottom:5px;">Quick Answer Key (정답표)</div><div class="ans-grid">`;
    data.forEach((q, i) => { ansHtml += `<div class="ans-item"><span style="color:#3b82f6;">${i + 1}.</span> ${secureFormat(q.answer)}</div>`; });
    ansHtml += `</div>`;
    ansSheet.innerHTML = ansHtml;
    pool.appendChild(ansSheet);
}

/* [Engine] 정밀 조판 시스템 */
async function paginate() {
    // 렌더링 안착을 위한 double rAF
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const isSolMode = document.body.classList.contains('sol-mode');
    
    let page, col, used = 0, colIdx = 0, COL_LIMIT = 0;
    
    const addPage = () => {
        page = document.createElement('div'); 
        page.className = 'page';
        // 헤더 출력 시 AppState.title에 escapeHtml 적용 (XSS 방어)
        page.innerHTML = `
            <div class="header">
                <span>${escapeHtml(AppState.title)}</span>
                <span>- ${printArea.children.length + 1} -</span>
            </div>
            <div class="content-container">
                <div class="col-left"></div>
                <div class="col-right"></div>
            </div>`;
        printArea.appendChild(page);
        col = page.querySelector('.col-left'); 
        used = 0; 
        colIdx = 0; 
        // COL_LIMIT 측정 정밀화 (getBoundingClientRect 사용)
        COL_LIMIT = col.getBoundingClientRect().height;
    };

    addPage();
    items.forEach(item => {
        if (item.classList.contains('answer-sheet') && !isSolMode) return;
        col.appendChild(item);
        
        // 문항 높이 소수점 정밀 측정 및 올림 처리
        const rectH = item.getBoundingClientRect().height;
        const itemH = Math.ceil(rectH);
        
        if (used + itemH > COL_LIMIT) {
            col.removeChild(item);
            if (colIdx === 0) { 
                col = page.querySelector('.col-right'); 
                colIdx = 1; 
                used = 0; 
            } else { 
                addPage(); 
            }
            col.appendChild(item);
            used = Math.ceil(item.getBoundingClientRect().height);
        } else { 
            used += itemH; 
        }
    });
    showStatus("", false); 
}

/* [Startup] 초기화 프로세스 */
async function initRender() {
    showStatus("데이터 분석 및 조판 중...", false);
    renderItems();
    if (window.MathJax) { 
        await MathJax.startup.promise; 
        await MathJax.typesetPromise([document.getElementById('item-pool')]); 
    }
    await paginate();
}

function showStatus(msg, isError = false) {
    const el = document.getElementById('status-display');
    if (!msg) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.innerHTML = `
        <h3 style="color:${isError ? '#ef4444' : '#1e293b'}">${isError ? '⚠️ 오류' : '⚙️ 처리 중'}</h3>
        <p>${msg}</p>` + 
        (isError ? `<button onclick="location.reload()" style="margin-top:10px; cursor:pointer;">재시도</button>` : '');
}

/* [Controller] 데이터 로드 제어부 (IIFE) */
(function loadControl() {
    const params = new URLSearchParams(window.location.search);
    const dataFile = params.get('data');

    // 1. 파라미터가 없을 때 대시보드 출력
    if (!dataFile) {
        document.getElementById('print-area').innerHTML = renderRecentExams();
        document.getElementById('mode-ctrl').style.display = 'none'; // 대시보드에선 컨트롤러 숨김
        return;
    }

    // 2. 보안 검사: 파일명 규격 확인
    if (!dataFile.match(/^[a-zA-Z0-9가-힣_\-\.\/]+\.js$/)) {
        showStatus("파일명에 허용되지 않는 문자가 있습니다.", true);
        return;
    }

    // 3. 상태 설정
    AppState.fileKey = dataFile.split('.')[0];
    AppState.title = decodeURIComponent(params.get('title') || "AP 수학학원 기출");

    // 4. 스크립트 동적 로드
    const base = window.location.pathname.replace(/\/[^\/]*$/, '/');
    const script = document.createElement('script');
    script.src = base + dataFile + '?v=' + Date.now();
    
    script.onload = () => {
        if (!Array.isArray(window.questionBank) || window.questionBank.length === 0) {
            showStatus(`파일(${dataFile}) 로드 성공.<br>그러나 데이터가 올바르지 않습니다.`, true);
            return;
        }
        updateRecentExams(AppState.title, dataFile);
        // SPA 전환 시를 대비한 모드 컨트롤러 복원
        document.getElementById('mode-ctrl').style.display = 'flex';
        initRender();
    };

    script.onerror = () => showStatus(`파일(${dataFile}) 로드 실패.<br>경로를 확인해주세요.`, true);
    document.body.appendChild(script);
})();
</script>
