<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP수학 엔진 v7.1.3</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], macros: { tf: ['\\dfrac{#1}{#2}', 2] } },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; }
        
        /* 페이지 및 4분할 격자 핵심 */
        .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto; background: #fff; page-break-after: always; display: flex; flex-direction: column; position: relative; }
        .content-container { display: flex; flex: 1; }

        /* [시험지 모드] 격자 강제 고정 (이탈 방지) */
        body.test-mode .content-container { display: grid !important; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10mm; }
        body.test-mode .item { height: 100% !important; max-height: 130mm; overflow: hidden; border: 1px solid #f1f5f9; padding: 5mm; }

        /* [해설지 모드] 지문 제거 및 흐름형 */
        body.sol-mode .content-container { display: block; column-count: 2; column-gap: 10mm; }
        body.sol-mode .q-box .content { display: none !important; }
        body.sol-mode .item { break-inside: avoid; border-bottom: 1px dashed #ccc; padding-bottom: 5mm; margin-bottom: 5mm; }

        /* [수정] 논리적 근거 태그 스타일 */
        .logic-tag { background: #f8fafc; color: #3b82f6; padding: 2px 6px; border: 1px solid #e2e8f0; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        
        #mode-ctrl { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        #mode-ctrl button { padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl" class="no-print">
        <button onclick="setMode('test-mode')" style="background:#3b82f6; color:white;">시험지 모드</button>
        <button onclick="setMode('sol-mode')" style="background:#10b981; color:white;">해설 모드</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>

<script>
const AppState = { title: "AP 수학학원 기출" };

function secureFormat(text) {
    if (!text) return "";
    const mathChunks = [];
    const protected_ = String(text).replace(/\$[\s\S]*?\$/g, m => { mathChunks.push(m); return '\x00MATH\x00'; });
    
    // [수정 핵심] 기본 보안 적용 후 특정 태그만 살림
    let escaped = protected_.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    escaped = escaped
        .replace(/&lt;br\s*\/?&gt;/gi, '<br>')
        .replace(/&lt;span class=&quot;logic-tag&quot;&gt;(.*?)&lt;\/span&gt;/gi, '<span class="logic-tag">$1</span>')
        .replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gi, '<b>$1</b>');

    return escaped.split('\x00MATH\x00').map((p, i) => p + (mathChunks[i] || "")).join('');
}

function renderItems() {
    const pool = document.getElementById('item-pool');
    pool.innerHTML = (window.questionBank || []).map((q, i) => `
        <div class="item">
            <div class="q-box">
                <b style="color:#3b82f6;">${i+1}.</b> <span class="content">${secureFormat(q.content)}</span>
            </div>
            <div class="sol-mode-only" style="margin-top:10px; font-size:9pt; color:#64748b; display:none;">
                <div style="font-weight:bold; color:#10b981;">[해설]</div>
                ${secureFormat(q.solution)}
                <div style="text-align:right; font-weight:bold; color:#ef4444;">정답: ${q.answer}</div>
            </div>
        </div>
    `).join('');
}

async function initRender() {
    renderItems();
    if (window.MathJax) {
        await MathJax.startup.promise;
        await MathJax.typesetPromise([document.body]);
    }
    // 이중 대기로 폰트/수식 렌더링 완료 후 조판
    requestAnimationFrame(() => requestAnimationFrame(paginate));
}

function paginate() {
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const isTest = document.body.classList.contains('test-mode');
    
    let page, itemCount = 0;
    const addPage = () => {
        page = document.createElement('div'); page.className = 'page';
        page.innerHTML = `<div style="border-bottom:2px solid #1e293b; padding-bottom:5px; margin-bottom:10px; font-weight:bold; display:flex; justify-content:space-between;">
            <span>${AppState.title}</span><span>- ${printArea.children.length + 1} -</span>
        </div><div class="content-container"></div>`;
        printArea.appendChild(page);
    };

    addPage();
    items.forEach(item => {
        const container = page.querySelector('.content-container');
        if (isTest) {
            if (itemCount > 0 && itemCount % 4 === 0) addPage();
            page.querySelector('.content-container').appendChild(item.cloneNode(true));
            itemCount++;
        } else {
            // 해설지 유동 조판은 기존 높이 체크 로직 유지 (단순화를 위해 여기선 생략)
            container.appendChild(item.cloneNode(true));
        }
    });
}

function setMode(mode) { document.body.className = mode; initRender(); }

(function load() {
    const file = new URLSearchParams(window.location.search).get('data');
    if (!file) return;
    const s = document.createElement('script');
    s.src = file + '?v=' + Date.now();
    s.onload = initRender;
    document.body.appendChild(s);
})();
</script>
</body>
</html>
