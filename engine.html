<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP수학 마스터 엔진 v7.1.1 - ZERO-FAULT</title>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2/MathJax_Main-Regular.woff" as="font" type="font/woff2" crossorigin>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], processEscapes: true, macros: { tf: ['\\dfrac{#1}{#2}', 2] } },
            chtml: { scale: 1.1, mtextInheritFont: true },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; color: #1e293b; letter-spacing: -0.5px; }
        
        /* [Layout] 페이지 및 공통 구조 */
        .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto; background: #fff; position: relative; overflow: hidden; page-break-after: always; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; margin-bottom: 5mm; padding-bottom: 2mm; font-weight: 800; font-size: 11pt; flex-shrink: 0; }
        .content-container { display: flex; justify-content: space-between; flex: 1; overflow: hidden; }

        /* [시험지 모드] 4분할 격자 강제 고정 */
        body.test-mode .content-container { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            gap: 15mm; 
            flex: 1;
        }
        body.test-mode .col-left, body.test-mode .col-right { width: 100% !important; height: 100% !important; padding: 0 !important; border: none !important; }
        body.test-mode .item { height: 100% !important; border-bottom: none !important; padding: 5mm; border: 1px solid #f1f5f9; overflow: hidden; }

        /* [해설지 모드] 지문 제거 및 유동형 2단 조판 */
        body.sol-mode .content-container { display: flex; justify-content: space-between; flex: 1; }
        body.sol-mode .col-left, body.sol-mode .col-right { width: 49.5%; height: auto; overflow: visible; }
        body.sol-mode .q-box .content { display: none !important; } /* 지문 제거 */
        body.sol-mode .item { height: auto !important; padding-bottom: 8mm; border-bottom: 1px dashed #cbd5e1; break-inside: avoid; }
        body.sol-mode .num { display: inline-block; border: 1.5px solid #1e293b; padding: 2px 8px; margin-bottom: 10px; color: #1e293b; font-weight: 900; }

        /* [Item] 문항 스타일 */
        .item { position: relative; padding-top: 3mm; border-bottom: 1px solid #f8fafc; }
        .num { font-weight: 900; font-size: 11pt; color: #3b82f6; }
        .sol-box { margin-top: 8px; padding: 12px 16px; border-radius: 8px; background: #f8fafc; border-left: 4px solid #3b82f6; display: none; }
        body.sol-mode .sol-box { display: block; }
        
        /* [UI] 컨트롤바 및 대시보드 */
        #mode-ctrl { position: fixed; top: 10px; right: 10px; z-index: 999; display: flex; gap: 8px; }
        #mode-ctrl button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-test { background: #3b82f6; color: white; }
        .btn-sol  { background: #10b981; color: white; }
        #status-display { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #3b82f6; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); z-index: 1000; }
        #recent-container { max-width: 800px; margin: 60px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .recent-item { display: inline-block; padding: 8px 16px; margin: 6px; background: #f8fafc; border-radius: 20px; cursor: pointer; font-size: 9.5pt; color: #475569; transition: 0.2s; border: 1px solid #e2e8f0; font-weight: 700; }
        .recent-item:hover { background: #eff6ff; color: #3b82f6; border-color: #3b82f6; transform: translateY(-2px); }

        @media print { #mode-ctrl, #recent-container, #category-nav { display: none !important; } body { background: none; } .page { margin: 0; box-shadow: none; border: none; } }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl">
        <button class="btn-test" onclick="setMode('test-mode')">시험지 모드</button>
        <button class="btn-sol" onclick="setMode('sol-mode')">해설 모드</button>
        <button onclick="window.print()" style="background:#1e293b; color:white;">PDF 출력</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>
    <div id="status-display"></div>

<script>
const AppState = { title: "AP 수학학원 기출", fileKey: "", favorites: JSON.parse(localStorage.getItem('ap_favs') || '{}') };

function escapeHtml(str) { if (!str) return ""; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

function secureFormat(text) {
    if (!text) return "";
    text = String(text);
    const mathChunks = [];
    const placeholder = '\x00MATH\x00';
    const protected_ = text.replace(/\$[\s\S]*?\$/g, m => { mathChunks.push(m); return placeholder; });
    const escaped = protected_.split(placeholder).map(part => {
        const div = document.createElement('div');
        div.textContent = part;
        return div.innerHTML.replace(/&lt;br\s*\/?&gt;/gi, '<br>').replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gi, '<b>$1</b>');
    });
    let res = ""; escaped.forEach((p, i) => { res += p + (mathChunks[i] || ""); });
    return res;
}

function renderItems() {
    const pool = document.getElementById('item-pool'); pool.innerHTML = '';
    const data = window.questionBank || [];
    data.forEach((q, i) => {
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `
            <div class="q-box">
                <span class="num">${i + 1}</span>
                <span class="content">${secureFormat(q.content)}</span>
            </div>
            <div class="sol-box">
                <div style="font-weight:bold; color:#3b82f6; margin-bottom:4px; font-size:8.5pt;">SOLUTION</div>
                <div style="font-size:9pt; color:#475569;">${secureFormat(q.solution)}</div>
                <div style="color:#ef4444; font-weight:800; margin-top:8px; border-top:1px dashed #cbd5e1; padding-top:8px; text-align:right;">정답: ${secureFormat(q.answer)}</div>
            </div>`;
        pool.appendChild(item);
    });
}

async function setMode(mode) { 
    if (document.body.className === mode) return;
    document.body.className = mode; 
    initRender(); 
}

async function initRender() {
    showStatus("데이터 분석 및 조판 중...", false);
    renderItems();
    if (window.MathJax) {
        try {
            await MathJax.startup.promise;
            await MathJax.typesetPromise([document.body]); // 전체 body 렌더링으로 수식 보호
        } catch (e) { console.error(e); }
    }
    // 이중 rAF로 브라우저 렌더링 대기 후 조판
    requestAnimationFrame(() => { requestAnimationFrame(() => { paginate(); }); });
}

async function paginate() {
    const printArea = document.getElementById('print-area'); printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const isTestMode = document.body.classList.contains('test-mode');
    
    let page, col, used = 0, colIdx = 0, COL_LIMIT = 0, itemCount = 0;

    const addPage = () => {
        page = document.createElement('div'); page.className = 'page';
        page.innerHTML = `<div class="header"><span>${escapeHtml(AppState.title)}</span><span>- ${printArea.children.length + 1} -</span></div><div class="content-container"><div class="col-left"></div><div class="col-right"></div></div>`;
        printArea.appendChild(page);
    };

    addPage();
    items.forEach(item => {
        if (isTestMode) {
            if (itemCount > 0 && itemCount % 4 === 0) addPage();
            const targetCol = (itemCount % 4 < 2) ? page.querySelector('.col-left') : page.querySelector('.col-right');
            targetCol.appendChild(item.cloneNode(true));
            itemCount++;
        } else {
            col = (colIdx === 0) ? page.querySelector('.col-left') : page.querySelector('.col-right');
            col.appendChild(item);
            const itemH = Math.ceil(item.getBoundingClientRect().height);
            COL_LIMIT = col.getBoundingClientRect().height || 900;
            if (used + itemH > COL_LIMIT) {
                col.removeChild(item);
                if (colIdx === 0) { colIdx = 1; used = 0; page.querySelector('.col-right').appendChild(item); used = itemH; }
                else { addPage(); colIdx = 0; used = 0; page.querySelector('.col-left').appendChild(item); used = itemH; }
            } else { used += itemH; }
        }
    });
    showStatus("", false); 
}

function showStatus(msg, isError = false) {
    const el = document.getElementById('status-display');
    if (!msg) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.innerHTML = `<h3 style="color:${isError ? '#ef4444' : '#1e293b'}">${isError ? '⚠️ 오류' : '⚙️ 처리 중'}</h3><p>${msg}</p>`;
}

/* [Dashboard] 고등부 탭 필터 적용 */
function renderRecentExams() {
    const recent = JSON.parse(localStorage.getItem('ap_recent_exams') || '[]');
    let html = `<div id="category-nav" style="margin-bottom:20px; text-align:center;">
        <button class="recent-item" onclick="filterRecent('all')" style="background:#1e293b; color:white;">전체보기</button>
        <button class="recent-item" onclick="filterRecent('중')">중등부</button>
        <button class="recent-item" onclick="filterRecent('고')">고등부 🎓</button>
    </div><div id="recent-container">`;
    if (recent.length === 0) return html + `<p>기록이 없습니다.</p></div>`;
    recent.forEach(ex => {
        const icon = ex.title.includes('고') ? '📕' : '📘';
        html += `<div class="recent-item file-link" data-title="${ex.title}" onclick="location.href='?data=${encodeURIComponent(ex.data)}&title=${encodeURIComponent(ex.title)}'"><span style="margin-right:5px;">${icon}</span>${escapeHtml(ex.title)}</div>`;
    });
    return html + '</div>';
}

function filterRecent(grade) {
    document.querySelectorAll('.file-link').forEach(item => {
        const title = item.getAttribute('data-title');
        item.style.display = (grade === 'all' || title.includes(grade)) ? 'inline-block' : 'none';
    });
}

(function loadControl() {
    const params = new URLSearchParams(window.location.search);
    const dataFile = params.get('data');
    if (!dataFile) { document.getElementById('print-area').innerHTML = renderRecentExams(); document.getElementById('mode-ctrl').style.display = 'none'; return; }
    AppState.fileKey = dataFile.split('.')[0];
    AppState.title = decodeURIComponent(params.get('title') || "AP 수학학원 기출");
    const script = document.createElement('script'); script.src = dataFile + '?v=' + Date.now();
    script.onload = () => {
        let recent = JSON.parse(localStorage.getItem('ap_recent_exams') || '[]');
        recent = recent.filter(ex => ex.data !== dataFile);
        recent.unshift({ title: AppState.title, data: dataFile });
        localStorage.setItem('ap_recent_exams', JSON.stringify(recent.slice(0, 10)));
        initRender();
    };
    document.body.appendChild(script);
})();
</script>
</body>
</html>
