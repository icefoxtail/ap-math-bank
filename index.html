<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP수학 마스터 엔진 v6.5.3 - 고품질 인쇄 모드</title>
    <script>
        let globalExamTitle = "";
        let dbData = null;

        function secureFormat(text) {
            if (!text) return "";
            return text.split(/(\$[\s\S]*?\$)/g).map(part => {
                if (part.startsWith('$')) return part;
                let escaped = part.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                escaped = escaped.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
                escaped = escaped.replace(/&lt;div(.*?)&gt;/gi, '<div$1>');
                escaped = escaped.replace(/&lt;\/div&gt;/gi, '</div>');
                escaped = escaped.replace(/&lt;span(.*?)&gt;/gi, '<span$1>');
                escaped = escaped.replace(/&lt;\/span&gt;/gi, '</span>');
                escaped = escaped.replace(/&lt;b&gt;/gi, '<b>').replace(/&lt;\/b&gt;/gi, '</b>');
                return escaped.replace(/([^\s])=([^\s])/g, '$1 = $2').replace(/([^\s])\+([^\s])/g, '$1 + $2');
            }).join('');
        }

        /* [변경 위치: MathJax 설정 - 분수 크기 및 가독성 해결] */
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$']], 
                processEscapes: true, 
                // 기존 \tfrac(작은분수) 대신 \dfrac(기본큰분수)로 매크로 변경하여 시인성 확보
                macros: { tf: ['\\dfrac{#1}{#2}', 2] } 
            },
            chtml: { 
                scale: 1.1, // 전체적인 수식 밸런스 조정
                minScale: 0.8, 
                mtextInheritFont: true 
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @font-face { 
            font-family: 'KoPubBatang'; 
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/KoPubBatangMedium.woff') format('woff'); 
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'KoPubBatang', serif; font-size: 9.5pt; background: #f1f5f9; color: #1e293b; letter-spacing: -0.5px; }
        
        /* [변경 위치: 보기 배열 최적화 스타일] */
        .choices-container { width: 100%; margin-top: 4mm; display: flex; flex-wrap: wrap; font-size: 9pt; line-height: 1.5; }
        .choice-item { padding: 2px 0; vertical-align: top; display: flex; align-items: flex-start; }
        
        /* 등분 설정 (JS에서 클래스 부여) */
        .w-100 { width: 100% !important; } /* 1단 (긴 문장) */
        .w-50 { width: 50% !important; }  /* 2단 */
        .w-33 { width: 33.3% !important; } /* 3단 */
        .w-20 { width: 20% !important; }  /* 5단 (숫자/단축어) */

        .page { width: 210mm; height: 297mm; padding: 15mm 15mm; margin: 10mm auto; background: #fff; position: relative; overflow: hidden; page-break-after: always; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; margin-bottom: 5mm; padding-bottom: 2mm; font-weight: 800; font-size: 11pt; }
        .content-container { display: flex; justify-content: space-between; height: 260mm; }
        .col-left, .col-right { width: 49.5%; height: 100%; overflow: hidden; }
        .col-left { border-right: 1px solid #f1f5f9; padding-right: 6mm; }
        .col-right { padding-left: 6mm; }

        body.test-mode .item { height: 130mm; border-bottom: 1px solid #f8fafc; padding-top: 3mm; overflow: hidden; }
        body.sol-mode .item { height: auto; padding-bottom: 6mm; border-bottom: 1px solid #f1f1f1; }
        .num { font-weight: 900; font-size: 11pt; color: #3b82f6; margin-right: 6px; }
        .sol-box { margin-top: 8px; padding: 12px 16px; border-radius: 8px; background: #f8fafc; border-left: 4px solid #3b82f6; }
        body.test-mode .sol-box { display: none !important; }
        @media print { #mode-ctrl, #main-view { display: none !important; } body { background: none; } .page { margin: 0; box-shadow: none; border: none; } }
    </style>
</head>
<body class="test-mode">
    <script>
        /* [변경 위치: 지능형 보기 배열 로직] */
        function getChoiceLayout(choices) {
            const totalLen = choices.join('').length;
            const maxLen = Math.max(...choices.map(c => c.length));
            
            if (maxLen > 25 || totalLen > 70) return "w-100"; // 문장이 길면 1단
            if (maxLen > 15 || totalLen > 45) return "w-50";  // 중간이면 2단
            if (maxLen > 8) return "w-33";                   // 짧으면 3단
            return "w-20";                                   // 숫자/단어면 5단(한 줄)
        }

        function renderItems() {
            const pool = document.getElementById('item-pool');
            pool.innerHTML = '';
            const data = window.questionBank || [];
            
            data.forEach((q, i) => {
                const item = document.createElement('div');
                item.className = 'item';
                
                const safeChoices = (q.choices || []).map(c => secureFormat(c));
                let choiceSection = "";

                if (safeChoices.length === 5 && safeChoices[0].trim() !== "") {
                    const layoutClass = getChoiceLayout(q.choices); // 원본 텍스트로 길이 판별
                    choiceSection = `<div class="choices-container">` + 
                        safeChoices.map((c, idx) => `<div class="choice-item ${layoutClass}"><span>${['①','②','③','④','⑤'][idx]}</span>&nbsp;<span>${c}</span></div>`).join('') + 
                        `</div>`;
                } else {
                    // [변경 위치: 풀이 기록란 삭제] 보기가 없으면 완전 공란 처리
                    choiceSection = `<div style="height:20mm;"></div>`; 
                }

                item.innerHTML = `<div class="q-box"><span class="num">${i + 1}</span><span class="content">${secureFormat(q.content)}</span>${choiceSection}</div><div class="sol-box"><span style="font-weight:bold; color:#3b82f6; font-size:8.5pt; display:block; margin-bottom:6px;">SOLUTION</span><div style="font-size:9pt; color:#475569;">${secureFormat(q.solution)}</div><div style="font-weight:800; color:#ef4444; font-size:9.5pt; margin-top:10px; border-top:1px dashed #cbd5e1; padding-top:8px;">정답: ${secureFormat(String(q.answer))}</div></div>`;
                pool.appendChild(item);
            });
        }
        // ... (이하 paginate 및 기존 로직 유지)
    </script>
</body>
</html>
