<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP 수학학원 - 스마트 기출 자료실</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                macros: { 
                    tf: ["\\dfrac{#1}{#2}", 2] 
                }
            },
            options: { renderActions: { addMenu: [] } }
        };
    </script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); font-size: 24px; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #eee; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #999; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .exam-item { display: block; padding: 15px; border-bottom: 1px solid #f1f1f1; text-decoration: none; color: #333; transition: 0.2s; }
        .exam-item:hover { background: #f9f9f9; padding-left: 20px; }
        .q-card { margin-bottom: 40px; padding: 20px; border: 1px solid #eee; border-radius: 10px; position: relative; }
        .q-num { font-weight: bold; color: var(--accent); font-size: 18px; margin-bottom: 15px; }
        .q-text { font-size: 17px; margin-bottom: 20px; word-break: keep-all; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
        .option { display: flex; align-items: flex-start; gap: 8px; font-size: 16px; }
        .ans-section { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ddd; display: none; }
        .ans-btn { background: #eee; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; color: #666; }
        .ans-btn:hover { background: #ddd; }
        #main-view { display: block; }
        #exam-view { display: none; }
        .back-bar { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h1>AP 수학학원 기출 저장소</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="학교명 또는 연도 검색...">
    <div class="tabs" id="categoryTabs"></div>
    <div id="examList"></div>
</div>

<div class="container" id="exam-view">
    <div class="back-bar">
        <button class="ans-btn" onclick="location.href=location.pathname">← 목록으로</button>
        <button class="ans-btn" style="float:right" onclick="toggleAllAnswers()">정답 모두 보기</button>
    </div>
    <div id="exam-content"></div>
</div>

<script>
    let dbData = null;

    async function init() {
        try {
            const res = await fetch('db.json');
            dbData = await res.json();
            renderTabs();
            renderList(Object.keys(dbData.exams)[0]); 
        } catch (e) { alert("db.json 파일을 확인해주세요."); }
    }

    function renderTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = Object.keys(dbData.exams).map((cat, i) => 
            `<button class="tab-btn ${i===0?'active':''}" onclick="changeTab(this, '${cat}')">${cat}</button>`
        ).join('');
    }

    function renderList(cat, filter = '') {
        const listDiv = document.getElementById('examList');
        let html = '';
        const data = dbData.exams[cat];
        if (!Array.isArray(data)) {
            for (const [grade, exams] of Object.entries(data)) {
                html += `<div style="background:#f9f9f9; padding:5px 15px; font-weight:bold; margin-top:15px;">${grade}</div>`;
                exams.forEach(ex => {
                    if (ex.title.includes(filter)) html += `<a href="?data=${ex.file}" class="exam-item">${ex.title}</a>`;
                });
            }
        } else {
            data.forEach(ex => {
                if (ex.title.includes(filter)) html += `<a href="?data=${ex.file}" class="exam-item">${ex.title}</a>`;
            });
        }
        listDiv.innerHTML = html;
    }

    function changeTab(btn, cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList(cat);
    }

    // [교정 포인트] 데이터 필드명 동기화: content, choices, solution
    function render() {
        const content = document.getElementById('exam-content');
        if (typeof questionBank === 'undefined') return;

        content.innerHTML = questionBank.map((q, idx) => `
            <div class="q-card">
                <div class="q-num">${idx + 1}번</div>
                <div class="q-text">${q.content}</div>
                <div class="options-grid">
                    ${q.choices ? q.choices.map((opt, i) => `<div class="option"><span>${['①','②','③','④','⑤'][i]}</span> <span>${opt}</span></div>`).join('') : ''}
                </div>
                <button class="ans-btn" style="margin-top:15px" onclick="this.nextElementSibling.style.display='block'">정답 확인</button>
                <div class="ans-section">
                    <b style="color:red">정답: ${q.answer}</b><br>
                    <small style="color:#666">${q.solution || '해설이 없습니다.'}</small>
                </div>
            </div>
        `).join('');
        
        if (window.MathJax) MathJax.typeset();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const dataFile = urlParams.get('data');

    if (dataFile) {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('exam-view').style.display = 'block';
        const script = document.createElement('script');
        script.src = dataFile;
        script.onload = () => { setTimeout(render, 100); };
        document.body.appendChild(script);
    }

    function toggleAllAnswers() {
        document.querySelectorAll('.ans-section').forEach(s => s.style.display = 'block');
    }

    window.onload = init;
    document.getElementById('searchInput').oninput = (e) => {
        const activeTab = document.querySelector('.tab-btn.active').innerText;
        renderList(activeTab, e.target.value);
    };
</script>
</body>
</html>
