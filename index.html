<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP수학 기출 아카이브 v7.2.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { margin: 0; padding: 40px; font-family: 'Pretendard', sans-serif; background: #f8fafc; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 900; font-size: 2.5rem; color: #0f172a; margin-bottom: 20px; }
        .search-bar { width: 100%; max-width: 500px; padding: 14px 20px; border-radius: 14px; border: 2px solid #e2e8f0; font-size: 11pt; outline: none; transition: 0.2s; }
        .search-bar:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        /* [필터 디자인] 중등 Blue / 고등 Red 포인트 */
        .filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .filter-group { display: flex; gap: 8px; align-items: center; padding: 0 15px; border-right: 1px solid #e2e8f0; }
        .filter-btn { padding: 10px 20px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-weight: 700; color: #64748b; transition: 0.2s; }
        .filter-btn.active[data-group="all"] { background: #1e293b; color: white; border-color: #1e293b; }
        .filter-btn.active[data-group="grade"]:not(.hs-btn) { background: #3b82f6; color: white; border-color: #3b82f6; }
        .filter-btn.hs-btn.active { background: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }

        .exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .exam-card { background: white; border-radius: 18px; padding: 26px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s; position: relative; }
        .exam-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 8.5pt; font-weight: 800; margin-right: 8px; }
        .badge-ms { background: #eff6ff; color: #3b82f6; }
        .badge-hs { background: #fef2f2; color: #dc2626; }
        .exam-title { font-size: 14pt; font-weight: 800; color: #1e293b; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AP수학 기출 저장소 📂</h1>
            <input type="text" id="search-input" class="search-bar" placeholder="학교명, 단원, 키워드 검색...">
        </header>

        <div class="filters" id="filter-bar">
            <button class="filter-btn active" data-group="all" data-value="all">전체보기</button>
            <div class="filter-group">
                <button class="filter-btn" data-group="grade" data-value="중1">중1</button>
                <button class="filter-btn" data-group="grade" data-value="중2">중2</button>
                <button class="filter-btn" data-group="grade" data-value="중3">중3</button>
            </div>
            <div class="filter-group" style="border:none;">
                <button class="filter-btn hs-btn" data-group="grade" data-value="고1">고1 🎓</button>
                <button class="filter-btn hs-btn" data-group="grade" data-value="고2">고2 🎓</button>
                <button class="filter-btn hs-btn" data-group="grade" data-value="고3">고3 🎓</button>
            </div>
        </div>

        <div id="exam-list" class="exam-grid"></div>
        <div id="status" style="text-align:center; padding:50px; color:#94a3b8; font-weight:700;">데이터를 불러오는 중...</div>
    </div>

<script>
let examData = [];
let filterState = { search: '', grade: 'all' };

async function loadExams() {
    try {
        const response = await fetch('db.json?v=' + Date.now());
        const data = await response.json();
        examData = data.exams || [];
        renderExams();
    } catch (e) { document.getElementById('status').innerText = "DB 로드 실패!"; }
}

function renderExams() {
    const list = document.getElementById('exam-list');
    const filtered = examData.filter(ex => {
        const matchSearch = ex.title.toLowerCase().includes(filterState.search.toLowerCase()) || ex.school.includes(filterState.search);
        // [수정 핵심] 완전 일치 비교 (ex.grade === "중2")
        const matchGrade = filterState.grade === 'all' || ex.grade === filterState.grade;
        return matchSearch && matchGrade;
    });

    list.innerHTML = '';
    document.getElementById('status').style.display = filtered.length ? 'none' : 'block';
    if(!filtered.length) { document.getElementById('status').innerText = "조건에 맞는 시험지가 없습니다."; return; }

    filtered.forEach(ex => {
        const isHs = ex.grade.includes('고');
        const card = document.createElement('div');
        card.className = 'exam-card';
        card.onclick = () => location.href = `engine.html?data=${encodeURIComponent(ex.file)}&title=${encodeURIComponent(ex.title)}`;
        card.innerHTML = `
            <div class="meta">
                <span class="badge ${isHs ? 'badge-hs' : 'badge-ms'}">${ex.grade}</span>
                <span class="badge" style="background:#f1f5f9; color:#64748b;">${ex.examType === 'mid' ? '중간' : '기말'}</span>
            </div>
            <div class="exam-title">${ex.title}</div>
        `;
        list.appendChild(card);
    });
}

document.getElementById('filter-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterState.grade = btn.dataset.value;
    renderExams();
});

document.getElementById('search-input').addEventListener('input', (e) => {
    filterState.search = e.target.value;
    renderExams();
});

loadExams();
</script>
</body>
</html>
